plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id "com.google.protobuf" version "0.10.0"
    id("io.freefair.lombok") version "9.4.0"
    id 'pmd'
    id 'checkstyle'
    id 'com.github.ben-manes.versions' version '0.54.0'
    id 'org.owasp.dependencycheck' version '12.2.1'
    id 'org.beryx.jlink' version '4.0.0'
}

// declare version numbers

group = 'dev.aisandbox'

def protobufVersion = '4.34.1'

// Determine the version from git: an exact tag on HEAD, or "snapshot" otherwise.
def gitVersion = {
    try {
        def stdout = new ByteArrayOutputStream()
        def result = exec {
            commandLine 'git', 'describe', '--tags', '--exact-match', 'HEAD'
            standardOutput = stdout
            errorOutput = new ByteArrayOutputStream()
            ignoreExitValue = true
        }
        return result.exitValue == 0 ? stdout.toString().trim() : 'snapshot'
    } catch (Exception ignored) {
        return 'snapshot'
    }
}()

// Keep this as an extension property rather than project.version — the beryx
// jlink plugin can bake project.version into the merged module's metadata,
// and non-semver strings like "snapshot" sometimes break createMergedModule.
ext.appVersion = gitVersion

run {
    enableAssertions = true
}

application {
    mainClass = 'dev.aisandbox.launcher.SandboxServerLauncher'
    applicationDefaultJvmArgs = [
            '--sun-misc-unsafe-memory-access=allow',
            '--enable-native-access=ALL-UNNAMED'
    ]
    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(25)
        }
    }
}

javafx {
    version = '25.0.3'
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.swing']
}

javadoc {
    destinationDir = file("build/docs/javadoc")
}

checkstyle {
    toolVersion = "10.23.0"
    checkstyleMain.source = "src/main/java"
    
    // Exclude auto-generated sources
    checkstyleMain {
        exclude '**/build/generated/**'
        exclude '**/build/generated-src/**'
        exclude '**/*Proto.java'
        exclude '**/*Grpc.java'
        exclude '**/proto/**'
    }
}

pmd {
    toolVersion = "7.22.0"
    consoleOutput = true
    ignoreFailures = false
    sourceSets = [project.sourceSets.main]
    ruleSetFiles = files("config/pmd/maths.xml")

    pmdMain {
        excludes = [
                '**/proto/**'
        ]
    }
}

dependencyCheck {
    // Generate both HTML (for humans) and XML (for Jenkins)
    format = 'ALL'

    // Fail the build if any dependency has a CVSS score of 7 or higher
    // (adjust this threshold to suit your risk tolerance)
    failBuildOnCVSS = 7.0

    // The NVD API key - read from an environment variable so it's not in source control
    nvd.apiKey = System.getenv('NVD_API_KEY') ?: ''

    // suppress known false positives
    suppressionFile = 'dependency-check-suppressions.xml'
}

tasks.register('copyDocs', Copy) {
    group = "documentation"
    description = "Copies documentation into the build tree."
    from 'documentation'
    into 'build/docs'
}

// Generate version.properties and feed it into processResources directly.
// We avoid adding a new resources srcDir so the jlink plugin's source-set
// scan does not pick this up while building the merged module-info.
tasks.register('generateVersionProperties') {
    group = "build"
    description = "Generates version.properties from the current git tag."

    def outputFile = layout.buildDirectory.file("generated/version/version.properties")
    def versionString = project.ext.appVersion

    inputs.property("version", versionString)
    outputs.file(outputFile)

    doLast {
        def f = outputFile.get().asFile
        f.parentFile.mkdirs()
        f.text = "version=${versionString}\n"
    }
}

processResources {
    from(tasks.named('generateVersionProperties'))
    // Lands at the classpath root as /version.properties
}

tasks.withType(JavaCompile).configureEach {
    options.deprecation = true
    options.compilerArgs << '-Xlint:unchecked'
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

protobuf {
    // Configure the protoc executable
    // Note: Multi-string notation warning is a known issue with protobuf plugin 0.9.5
    // and will be resolved in a future plugin version
    protoc { 
        artifact = "com.google.protobuf:protoc:${protobufVersion}"
    }
    generateProtoTasks {
        // all() returns the collection of all protoc tasks
        all().configureEach { task ->
            // Configure task options if needed
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // protobuf
    implementation "com.google.protobuf:protobuf-java:${protobufVersion}"
    // commons utilities
    implementation 'commons-cli:commons-cli:1.11.0'
    implementation 'org.apache.commons:commons-statistics-descriptive:1.2'
    implementation 'org.apache.commons:commons-lang3:3.20.0'
    implementation 'org.apache.commons:commons-text:1.15.0'
    implementation 'org.apache.commons:commons-rng-simple:1.7'
    implementation 'org.apache.commons:commons-rng-sampling:1.7'
    // logging
    implementation 'ch.qos.logback:logback-core:1.5.32'
    testImplementation 'org.slf4j:slf4j-api:2.1.0-alpha1'
    implementation 'ch.qos.logback:logback-classic:1.5.32'
    // external telemetry
    implementation 'io.opentelemetry:opentelemetry-api:1.61.0'
    implementation 'io.opentelemetry:opentelemetry-sdk:1.61.0'
    implementation 'io.opentelemetry:opentelemetry-exporter-otlp:1.61.0'
    // test libs
    testImplementation(platform('org.junit:junit-bom:6.0.3'))
    testImplementation('org.junit.jupiter:junit-jupiter')
    testRuntimeOnly('org.junit.platform:junit-platform-launcher')
    testImplementation('com.samskivert:jmustache:1.16')
}

test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
    }
}

jlink {
    options = ['--strip-debug', '--compress', 'zip-6', '--no-header-files', '--no-man-pages']
    launcher {
        name = 'AISandbox-Server'
        jvmArgs = [
                '--sun-misc-unsafe-memory-access=allow',
                '--enable-native-access=javafx.graphics,ALL-UNNAMED'
        ]
    }
    mergedModule {
        requires 'java.logging'
        requires 'java.naming'
        requires 'java.sql'
        requires 'java.xml'
    }
}

// Beryx's jlinkZip writes build/image.zip via ant.zip without preserving Unix
// execute bits on the generated launcher scripts in bin/, so extracting on
// Linux/macOS leaves bin/AISandbox-Server non-executable. After the default
// action runs, overwrite build/image.zip with one that has the right filemode
// on the launcher. The stray build/image-zip/ dir is removed so only the
// corrected zip remains.
tasks.named('jlinkZip').configure {
    doLast {
        def imageDir = layout.buildDirectory.dir("image").get().asFile
        def imageZip = layout.buildDirectory.file("image.zip").get().asFile
        def strayZipDir = layout.buildDirectory.dir("image-zip").get().asFile
        imageZip.delete()
        strayZipDir.deleteDir()
        ant.zip(destfile: imageZip) {
            zipfileset(dir: imageDir.parentFile) {
                include(name: "${imageDir.name}/**")
                exclude(name: "${imageDir.name}/bin/**")
            }
            zipfileset(dir: imageDir.parentFile, filemode: '755') {
                include(name: "${imageDir.name}/bin/**")
                exclude(name: "${imageDir.name}/bin/*.bat")
            }
            zipfileset(dir: imageDir.parentFile) {
                include(name: "${imageDir.name}/bin/*.bat")
            }
        }
    }
}

