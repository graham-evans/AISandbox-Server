plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id "com.google.protobuf" version "0.9.6"
    id("io.freefair.lombok") version "9.2.0"
    id 'pmd'
    id 'checkstyle'
    id 'com.github.ben-manes.versions' version '0.53.0'
    id 'org.owasp.dependencycheck' version '12.2.1'
}

group = 'dev.aisandbox'

def protobufVersion = '4.34.1'

run {
    enableAssertions = true
}

application {
    mainClass = 'dev.aisandbox.launcher.SandboxServerLauncher'
    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }
}

javafx {
    version = '21.0.8'
    modules = ['javafx.controls', 'javafx.fxml', 'javafx.swing']
    if (System.properties.containsKey('env')) {
        platform = System.properties['env']
    }
}

javadoc {
    destinationDir = file("build/docs/javadoc")
}

checkstyle {
    toolVersion = "10.23.0"
    checkstyleMain.source = "src/main/java"
    
    // Exclude auto-generated sources
    checkstyleMain {
        exclude '**/build/generated/**'
        exclude '**/build/generated-src/**'
        exclude '**/*Proto.java'
        exclude '**/*Grpc.java'
        exclude '**/proto/**'
    }
}

pmd {
    toolVersion = "7.0.0"
    consoleOutput = true
    ignoreFailures = true
    sourceSets = [project.sourceSets.main]

    pmdMain {
        excludes = [
                '**/proto/**'
        ]
    }
}

dependencyCheck {
    // Generate both HTML (for humans) and XML (for Jenkins)
    format = 'ALL'

    // Fail the build if any dependency has a CVSS score of 7 or higher
    // (adjust this threshold to suit your risk tolerance)
    failBuildOnCVSS = 7.0

    // The NVD API key - read from an environment variable so it's not in source control
    nvd.apiKey = System.getenv('NVD_API_KEY') ?: ''

    // suppress known false positives
    suppressionFile = 'dependency-check-suppressions.xml'
}

tasks.register('copyDocs', Copy) {
    group = "documentation"
    description = "Copies documentation into the build tree."
    from 'documentation'
    into 'build/docs'
}

tasks.withType(JavaCompile).configureEach {
    options.deprecation = true
    options.compilerArgs << '-Xlint:unchecked'
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
}

protobuf {
    // Configure the protoc executable
    // Note: Multi-string notation warning is a known issue with protobuf plugin 0.9.5
    // and will be resolved in a future plugin version
    protoc { 
        artifact = "com.google.protobuf:protoc:${protobufVersion}"
    }
    generateProtoTasks {
        // all() returns the collection of all protoc tasks
        all().configureEach { task ->
            // Configure task options if needed
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // protobuf
    implementation "com.google.protobuf:protobuf-java:${protobufVersion}"
    // commons utilities
    implementation 'commons-cli:commons-cli:1.11.0'
    implementation 'org.apache.commons:commons-statistics-descriptive:1.2'
    implementation 'org.apache.commons:commons-lang3:3.20.0'
    // logging
    implementation 'ch.qos.logback:logback-core:1.5.32'
    testImplementation 'org.slf4j:slf4j-api:2.1.0-alpha1'
    implementation 'ch.qos.logback:logback-classic:1.5.32'
    // test libs
    testImplementation(platform('org.junit:junit-bom:6.0.3'))
    testImplementation('org.junit.jupiter:junit-jupiter')
    testRuntimeOnly('org.junit.platform:junit-platform-launcher')
    testImplementation('com.samskivert:jmustache:1.16')
}

test {
    useJUnitPlatform()
    testLogging {
        events "passed", "skipped", "failed"
    }
}

